<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CaseCraze - Phone Case Store</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-XXXXXXX');
</script>

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #f8f9fc;
}

/* Header */
header {
    background: #111;
    color: white;
    padding: 20px;
    text-align: center;
}

/* Products */
.container {
    padding: 40px;
}

.products {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.card {
    background: white;
    width: 260px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.card h3 {
    margin: 10px 0;
}

.price {
    color: #27ae60;
    font-weight: bold;
}

/* Buttons */
button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
}

.view { background: #3498db; color: white; }
.cart { background: #f39c12; color: white; }
.buy { background: #2ecc71; color: white; }

button:hover {
    opacity: 0.9;
}

/* Payment Section */
#paymentSection {
    margin: 40px auto;
    max-width: 400px;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    display: none;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    margin-top: 40px;
}
</style>
</head>

<body>

<header>
<h1>📱 CaseCraze</h1>
<p>Trendy Phone Cases for Every Style</p>
</header>

<div class="container">
<h2 style="text-align:center;">Featured Cases</h2>

<div class="products">

<!-- Product 1 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1603898037225-1c7c4e5f0e5c" alt="Marble Case">
<div class="card-content">
<h3>🔥 Marble Case</h3>
<p class="price">₹499</p>

<button class="view" onclick="gtag('event','view_product',{product_name:'Marble Case'});">View</button>
<button class="cart" onclick="gtag('event','add_to_cart',{product_name:'Marble Case'});">Add to Cart</button>
<button class="buy" onclick="showPayment('Marble Case',499); gtag('event','buy_now',{product_name:'Marble Case'});">Buy Now</button>
</div>
</div>

<!-- Product 2 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a41552262d48" alt="Gradient Case">
<div class="card-content">
<h3>🌈 Gradient Case</h3>
<p class="price">₹399</p>

<button class="view" onclick="gtag('event','view_product',{product_name:'Gradient Case'});">View</button>
<button class="cart" onclick="gtag('event','add_to_cart',{product_name:'Gradient Case'});">Add to Cart</button>
<button class="buy" onclick="showPayment('Gradient Case',399); gtag('event','buy_now',{product_name:'Gradient Case'});">Buy Now</button>
</div>
</div>

<!-- Product 3 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1598327105666-5b89351aff97" alt="Matte Black Case">
<div class="card-content">
<h3>🖤 Matte Black Case</h3>
<p class="price">₹599</p>

<button class="view" onclick="gtag('event','view_product',{product_name:'Matte Black Case'});">View</button>
<button class="cart" onclick="gtag('event','add_to_cart',{product_name:'Matte Black Case'});">Add to Cart</button>
<button class="buy" onclick="showPayment('Matte Black Case',599); gtag('event','buy_now',{product_name:'Matte Black Case'});">Buy Now</button>
</div>
</div>

</div>
</div>

<!-- Payment Section -->
<div id="paymentSection">
<h3 id="productTitle"></h3>
<p id="productPrice"></p>

<p>Enter Card Number</p>
<input type="text" id="cardNumber" placeholder="1111 1111 1111 1111">

<br><br>
<button class="buy" onclick="processPayment()">Pay Now</button>

<p id="paymentResult"></p>

<p><b>Test Cards</b></p>
<p>
1111 1111 1111 1111 → Success<br>
2222 2222 2222 2222 → Failed
</p>
</div>

<footer>
<button onclick="gtag('event','signup_click');">Sign Up</button>
<button onclick="gtag('event','contact_click');">Contact</button>

<br><br>

<a href="https://www.instagram.com" onclick="gtag('event','external_link_click');">
Visit Instagram
</a>
</footer>

<script>
let selectedProduct="";
let selectedPrice=0;

function showPayment(product,price){
selectedProduct=product;
selectedPrice=price;

document.getElementById("paymentSection").style.display="block";
document.getElementById("productTitle").innerHTML="Buying: "+product;
document.getElementById("productPrice").innerHTML="Amount: ₹"+price;
}

function processPayment(){
let card=document.getElementById("cardNumber").value.replace(/\s/g,'');
let result=document.getElementById("paymentResult");

if(card==="1111111111111111"){
result.innerHTML="✅ Payment Successful!";
result.style.color="green";

gtag('event','purchase',{
transaction_id:'CASE'+Math.floor(Math.random()*100000),
value:selectedPrice,
currency:'INR',
product:selectedProduct
});
}
else if(card==="2222222222222222"){
result.innerHTML="❌ Payment Failed!";
result.style.color="red";
}
else{
result.innerHTML="❌ Invalid Card!";
result.style.color="red";
}
}
</script>

</body>
</html>
